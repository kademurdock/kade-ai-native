name: KadeAI
options:
  bundleIdPrefix: com.kademurdock
  deploymentTarget:
    iOS: "17.0"
targets:
  KadeAI:
    type: application
    platform: iOS
    sources: [Sources]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kademurdock.kadeai
        MARKETING_VERSION: "2.0"
        CURRENT_PROJECT_VERSION: 100
        DEVELOPMENT_TEAM: JQPWZ2RL9P
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Manual
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Kade-AI
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleIconName: AppIcon
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
    entitlements:
      path: KadeAI.entitlements
      properties:
        aps-environment: production
schemes:
  KadeAI:
    build:
      targets:
        KadeAI: all
    archive:
      config: Release
