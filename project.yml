name: KadeAI
options:
  bundleIdPrefix: com.kademurdock
  deploymentTarget:
    iOS: "17.0"
targets:
  KadeAI:
    type: application
    platform: iOS
    sources: [Sources]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kademurdock.kadeai
        MARKETING_VERSION: "2.0"
        CURRENT_PROJECT_VERSION: 100
        DEVELOPMENT_TEAM: JQPWZ2RL9P
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Manual
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Kade-AI
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleIconName: AppIcon
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        ITSAppUsesNonExemptEncryption: false
        # Phase 5 (voice mode): push-to-talk records via AVAudioRecorder.
        # iOS hard-crashes on first mic access attempt without this key --
        # no on-device speech recognition is used (no NSSpeechRecognitionUsageDescription
        # needed), audio is just captured and uploaded to the fork's existing
        # /api/files/speech/stt endpoint (Deepgram), same as the web app.
        NSMicrophoneUsageDescription: "Kade-AI uses your microphone so you can talk to your companions with your voice instead of typing."
        # Session 13 ("calling and spotters"): Spotter/Live mode shares your
        # camera during a call so your Spotter can see and describe what's
        # around you -- same crash-without-this-key rule as the mic string
        # above. Only requested the moment you actually tap "Bring in your
        # Spotter" (CameraCaptureController.start()), never on a plain voice call.
        NSCameraUsageDescription: "Kade-AI uses your camera so your Spotter can see what's around you and describe it during a call."
        NSLocationWhenInUseUsageDescription: "Kade-AI uses your location, only while the app is open and only when you turn on Share my location, so your companions can tell you where you are, what's nearby, and how to walk there."
        # Session 14 (lock-screen call controls). Two things need this:
        # a call must keep its audio engine running when the screen locks or
        # the app goes to the background -- otherwise hanging up from the
        # lock screen is moot because the call has already died -- and the
        # Now Playing item that carries those controls is only honoured for
        # an app that actually declares background audio. Scoped to `audio`
        # only; no location, no VoIP (this is deliberately NOT CallKit, see
        # StreamingCallService.startNowPlaying's doc comment).
        UIBackgroundModes: [audio]
        # Session 16 -- Home Screen Quick Actions (long-press/3D-Touch the
        # app icon). Declared STATICALLY here rather than set at runtime
        # via `UIApplication.shared.shortcutItems`: a static entry is
        # already there the moment the app is installed, before it has
        # ever been launched once -- a dynamic one wouldn't exist until
        # `didFinishLaunchingWithOptions` had run at least once to set it.
        # Same three destinations as the Siri Shortcuts (KadeAppIntents.swift),
        # same SF Symbols, routed through the exact same `IntentRouter` --
        # two discovery paths into ONE piece of plumbing, not two features
        # to maintain. See AppDelegate.swift for the handling half.
        # Session 17 (Kade: "a native way to access settings like speech
        # and whatnot. Accessability low vision stuff like that.") -- the
        # two easy-read font choices in Settings > Accessibility need
        # their font files actually registered with the system before
        # `Font.custom(...)` can find them by name. Both fonts are SIL
        # Open Font License 1.1 (Lexend: Google Fonts; OpenDyslexic:
        # antijingoist/opendyslexic) -- license text bundled alongside
        # them in Sources/Fonts/ for attribution. PostScript names (what
        # `Font.custom` actually looks up), confirmed via fontTools:
        # "Lexend-Regular", "OpenDyslexic-Regular", "OpenDyslexic-Bold".
        UIAppFonts:
          - Fonts/Lexend.ttf
          - Fonts/OpenDyslexic-Regular.otf
          - Fonts/OpenDyslexic-Bold.otf
        UIApplicationShortcutItems:
          - UIApplicationShortcutItemType: com.kademurdock.kadeai.callSpotter
            UIApplicationShortcutItemTitle: Call your Spotter
            UIApplicationShortcutItemSubtitle: Live visual companion
            UIApplicationShortcutItemIconSymbolName: eye
          - UIApplicationShortcutItemType: com.kademurdock.kadeai.transcribe
            UIApplicationShortcutItemTitle: Transcribe
            UIApplicationShortcutItemSubtitle: Record or import audio
            UIApplicationShortcutItemIconSymbolName: waveform
          - UIApplicationShortcutItemType: com.kademurdock.kadeai.conversations
            UIApplicationShortcutItemTitle: Your conversations
            UIApplicationShortcutItemIconSymbolName: bubble.left.and.bubble.right
          - UIApplicationShortcutItemType: com.kademurdock.kadeai.describe
            UIApplicationShortcutItemTitle: Describe
            UIApplicationShortcutItemSubtitle: Photo or document
            UIApplicationShortcutItemIconSymbolName: plus.viewfinder
          - UIApplicationShortcutItemType: com.kademurdock.kadeai.quickDictate
            UIApplicationShortcutItemTitle: Quick Dictate
            UIApplicationShortcutItemSubtitle: Copies to clipboard
            UIApplicationShortcutItemIconSymbolName: mic.badge.plus
    entitlements:
      path: KadeAI.entitlements
      properties:
        aps-environment: production
schemes:
  KadeAI:
    build:
      targets:
        KadeAI: all
    archive:
      config: Release
